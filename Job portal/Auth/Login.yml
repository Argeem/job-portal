info:
  name: Login
  type: http
  seq: 2

http:
  method: POST
  url: "{{localhost}}/api/auth/login"
  body:
    type: json
    data: |-
      {
        "email": "alex@mail.com",
        "password": "alex@123"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody()

        if(body){
          if(body.token){
            bru.setEnvVar("token", body.token)
          }
          if(body._id){
            bru.setEnvVar("user_id", body._id)
          }
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
